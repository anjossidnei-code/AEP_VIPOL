<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AEP Sistema — Login</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
body{background:linear-gradient(135deg,#0a1628 0%,#0f2244 50%,#0a1628 100%);
  display:flex;align-items:center;justify-content:center;min-height:100vh}

.login-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;
  padding:40px 36px;
  width:min(400px,95vw);
  backdrop-filter:blur(20px);
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}

.login-logo{
  text-align:center;
  margin-bottom:28px;
}
.logo-badge{
  display:inline-flex;flex-direction:column;align-items:center;
  background:#003366;color:white;
  padding:12px 24px;border-radius:10px;
  margin-bottom:12px;
}
.logo-badge-title{font-size:20px;font-weight:800;letter-spacing:.05em}
.logo-badge-sub{font-size:10px;opacity:.7;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.login-tagline{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.04em}

h2{font-size:15px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:20px;text-align:center}

.form-group{margin-bottom:14px}
label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
input{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  color:white;font-size:13px;font-family:inherit;
  transition:border-color .15s;outline:none;
}
input:focus{border-color:#4a9eff;background:rgba(74,158,255,.08)}
input::placeholder{color:rgba(255,255,255,.25)}

.btn-login{
  width:100%;padding:12px;margin-top:8px;
  background:#2563eb;color:white;
  border:none;border-radius:8px;
  font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;
  letter-spacing:.03em;
}
.btn-login:hover{background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.4)}
.btn-login:active{transform:none}
.btn-login:disabled{background:#334;cursor:default;transform:none}

.error-msg{
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.3);
  border-radius:6px;
  padding:8px 12px;
  color:#f87171;font-size:12px;
  margin-top:12px;display:none;text-align:center;
}
.error-msg.show{display:block}

.login-footer{
  margin-top:28px;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.08);
  text-align:center;
  font-size:10px;color:rgba(255,255,255,.2);
}

/* Loading spinner */
.spinner{display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:white;
  border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="logo-badge">
      <div class="logo-badge-title">AEP NR-17</div>
      <div class="logo-badge-sub">Ergonomia</div>
    </div>
    <div class="login-tagline">Sistema de Geração de Laudos</div>
  </div>

  <h2>Acesse sua conta</h2>

  <div class="form-group">
    <label>Usuário</label>
    <input type="text" id="login" placeholder="seu.login" autocomplete="username" autofocus>
  </div>
  <div class="form-group">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btn-entrar" onclick="entrar()">Entrar</button>
  <div class="error-msg" id="erro">Usuário ou senha incorretos.</div>

  <div class="login-footer">
    AEP Sistema © 2026 — Acesso restrito a usuários autorizados
  </div>
</div>

<script src="data/config.js"></script>
<script>
// ── SHA-256 implementation (no external dependency)
async function sha256(msg) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Check if already logged in
(function() {
  const sess = sessionStorage.getItem('aep_session');
  if (sess) {
    try {
      const s = JSON.parse(sess);
      if (s.userId && s.expiry > Date.now()) {
        redirectUser(s);
        return;
      }
    } catch(e) {}
    sessionStorage.removeItem('aep_session');
  }
})();

function redirectUser(session) {
  if (session.perfil === 'admin') {
    window.location.href = 'admin/index.html';
  } else {
    window.location.href = 'sistema.html';
  }
}

async function entrar() {
  const loginVal = document.getElementById('login').value.trim().toLowerCase();
  const senhaVal = document.getElementById('senha').value;
  const btn = document.getElementById('btn-entrar');
  const erro = document.getElementById('erro');

  if (!loginVal || !senhaVal) {
    erro.textContent = 'Preencha usuário e senha.';
    erro.classList.add('show'); return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verificando…';
  erro.classList.remove('show');

  const hash = await sha256(senhaVal);

  // Find user in config
  const user = (CONFIG.usuarios || []).find(u =>
    u.login.toLowerCase() === loginVal &&
    u.senhaHash.toLowerCase() === hash &&
    u.ativo !== false
  );

  if (!user) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
    erro.textContent = 'Usuário ou senha incorretos.';
    erro.classList.add('show');
    return;
  }

  // Save session (expires in 8h)
  const session = {
    userId: user.id,
    nome: user.nome,
    perfil: user.perfil,
    empresaId: user.empresaId,
    permissoes: user.permissoes || null,
    expiry: Date.now() + 8 * 60 * 60 * 1000,
  };
  sessionStorage.setItem('aep_session', JSON.stringify(session));
  redirectUser(session);
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
